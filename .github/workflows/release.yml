name: release

# Build the portable Windows .exe and attach it to a GitHub Release when a
# version tag (vX.Y.Z) is pushed. Manual runs (workflow_dispatch) build without
# publishing — handy for verifying the packaging.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable exe
        run: npm run dist

      - name: Upload artifact (manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: Glance-portable
          path: dist/*.exe

      - name: Publish release (tagged runs)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
