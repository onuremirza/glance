name: release

# Build the Windows installer (Setup) + portable .exe and attach them to a
# GitHub Release when a version tag (vX.Y.Z) is pushed. Manual runs
# (workflow_dispatch) build without publishing — handy for verifying packaging.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer + portable exe
        run: npm run dist

      - name: Upload artifacts (manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: Glance-windows
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap

      # latest.yml + .blockmap electron-updater için şart: updater sürüm meta'sını ve
      # delta bloklarını bu dosyalardan okur. Eksikse auto-update çalışmaz.
      - name: Publish release (tagged runs)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          generate_release_notes: true
